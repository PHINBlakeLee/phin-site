     #phin-root 가 이미 본문에 있어야 하므로 반드시 "푸터"에 넣을 것 (헤더 아님)

<script type="text/babel">

// ════════════════════════════════════════════════════════
// scoring.js v5
// ════════════════════════════════════════════════════════
(function () {
  'use strict';

  function clamp(val, min, max) {
    return Math.min(Math.max(val, min), max);
  }

  function ageMultiplier(age) {
    if (age < 30) return 0.6;
    if (age < 40) return 0.85;
    if (age < 50) return 1.0;
    if (age < 60) return 1.3;
    if (age < 70) return 1.6;
    return 1.8;
  }

  function smokingDeduction({ smokingStatus, cigarettesPerDay, quitMonths, age }) {
    if (smokingStatus === 'none') return 0;
    let base = 0;
    if (smokingStatus === 'current') {
      if (cigarettesPerDay >= 40)      base = 25;
      else if (cigarettesPerDay >= 20) base = 20;
      else if (cigarettesPerDay >= 10) base = 13;
      else                             base = 6;
    } else if (smokingStatus === 'quit') {
      base = quitMonths >= 24 ? 0 : quitMonths >= 12 ? 5 : quitMonths >= 6 ? 10 : 16;
    }
    return clamp(base * ageMultiplier(age), 0, 25);
  }

  function drinkingDeduction({ drinkingStatus, quitMonths, age }) {
    let base = 0;
    switch (drinkingStatus) {
      case 'daily':    base = 20; break;
      case 'frequent': base = 14; break;
      case 'moderate': base = 8;  break;
      case 'light':    base = 3;  break;
      case 'quit':
        base = quitMonths >= 24 ? 0 : quitMonths >= 12 ? 3 : 7;
        break;
      default: base = 0;
    }
    return clamp(base * ageMultiplier(age), 0, 20);
  }

  function exerciseDeduction({ exerciseDaysPerWeek, age }) {
    let base = 0;
    if (exerciseDaysPerWeek === 0)      base = 15;
    else if (exerciseDaysPerWeek === 1) base = 9;
    else if (exerciseDaysPerWeek === 2) base = 4;
    else                                base = 0;
    return clamp(base * ageMultiplier(age), 0, 15);
  }

  function sleepDeduction(sleepHours) {
    if (sleepHours <= 5)   return 15;
    if (sleepHours <= 6)   return 8;
    if (sleepHours <= 6.5) return 4;
    if (sleepHours <= 8.5) return 0;
    return 4;
  }

  function stressDeduction(stressLevel) {
    if (stressLevel === 4) return 10;
    if (stressLevel === 3) return 6;
    if (stressLevel === 2) return 2;
    return 0;
  }

  function bmiDeduction(bmi) {
    if (bmi >= 35)   return 12;
    if (bmi >= 30)   return 8;
    if (bmi >= 27)   return 4;
    if (bmi >= 25)   return 2;
    if (bmi >= 18.5) return 0;
    return 4;
  }

  function recoveryBonus({ smokingStatus, smokingQuitMonths, drinkingStatus, drinkingQuitMonths, exerciseDaysPerWeek, exerciseDuration, restingHeartRate }) {
    let bonus = 0;
    if (smokingStatus === 'quit') {
      if (smokingQuitMonths >= 24)      bonus += 10;
      else if (smokingQuitMonths >= 12) bonus += 5;
    }
    if (drinkingStatus === 'quit') {
      if (drinkingQuitMonths >= 24)      bonus += 8;
      else if (drinkingQuitMonths >= 12) bonus += 4;
    }
    if (exerciseDaysPerWeek >= 3) {
      if (exerciseDuration === 'over6m')     bonus += 7;
      else if (exerciseDuration === '3to6m') bonus += 3;
    }
    if (restingHeartRate > 0) {
      if (restingHeartRate <= 60)      bonus += 5;
      else if (restingHeartRate <= 70) bonus += 2;
    }
    return clamp(bonus, 0, 25);
  }

  function getTier({ rawScore, age, gender, hasOcr, ocrCount }) {
    const ageIdx = age < 30 ? 0 : age < 40 ? 1 : age < 50 ? 2 : age < 60 ? 3 : 4;
    const maleThresholds = [
      [80, 68, 54, 40, 25],
      [77, 65, 51, 37, 22],
      [74, 62, 48, 34, 19],
      [70, 58, 44, 30, 15],
      [65, 53, 39, 25, 10],
    ];
    const offset = gender === 'female' ? 5 : 0;
    const t = maleThresholds[ageIdx];
    if (rawScore >= t[0]+offset && hasOcr && ocrCount >= 3) return 'THE_PHIN';
    if (rawScore >= t[0]+offset && hasOcr && ocrCount >= 1) return 'BLACK';
    if (rawScore >= t[1]+offset) return 'GREEN';
    if (rawScore >= t[2]+offset) return 'BLUE';
    if (rawScore >= t[3]+offset) return 'YELLOW';
    if (rawScore >= t[4]+offset) return 'RED';
    return 'GRAY';
  }

  function tierInfo(tier) {
    const map = {
      'THE_PHIN': { label: '최상위 1%',  color: '#FFD700', name: 'THE PHiN' },
      'BLACK':    { label: '최상위 5%',  color: '#E5E5E5', name: 'BLACK PHiN' },
      'GREEN':    { label: '상위권',     color: '#34D378', name: 'GREEN PHiN' },
      'BLUE':     { label: '중상위',     color: '#60A5FA', name: 'BLUE PHiN' },
      'YELLOW':   { label: '중위',       color: '#FBBF24', name: 'YELLOW PHiN' },
      'RED':      { label: '중하위',     color: '#F87171', name: 'RED PHiN' },
      'GRAY':     { label: '하위권',     color: '#9CA3AF', name: 'GRAY PHiN' },
    };
    return map[tier] || map['GRAY'];
  }

  function accuracyIndex({ hasOcr, ocrCount, hasWatchData, hasHeartRate }) {
    let acc = 0.80;
    if (hasHeartRate)  acc += 0.02;
    if (hasWatchData)  acc += 0.03;
    if (hasOcr) {
      acc += ocrCount >= 5 ? 0.10 : ocrCount >= 3 ? 0.08 : ocrCount >= 2 ? 0.06 : 0.04;
    }
    return clamp(acc, 0.80, 0.95);
  }

  function calcBodyAge(age, rawScore) {
    const diff = (55.0 - rawScore) * 0.3;
    return Math.round(clamp(age + diff, 10, 99));
  }

  function convertWebAnswers(answers) {
    const ls      = answers.lifestyle  || [];
    const issues  = answers.bodyIssues || [];
    const stepKey = answers.steps      || 'low';
    const digital = answers.digital    || 'mid';

    const noExerciseSignal = ls.length === 0 && stepKey === 'low';

    const age    = parseInt(answers.ageNum    || answers.age    || 35);
    const gender = (answers.gender === 'female' || answers.gender === '여성') ? 'female' : 'male';
    const height = parseFloat(answers.heightNum || answers.height || 170);
    const weight = parseFloat(answers.weightNum || answers.weight || 70);
    const bmi    = height > 0 ? weight / Math.pow(height / 100, 2) : 22;

    const smokingStatus    = ls.includes('smoke') ? 'current' : 'none';
    const cigarettesPerDay = smokingStatus === 'current' ? 20 : 0;

    const drinkingStatus = ls.includes('drink') ? 'frequent' : 'none';

    const sleepHours = issues.includes('sleep') ? 5.0 : 7.0;

    let exerciseDays;
    if (ls.includes('nosport') || noExerciseSignal) {
      exerciseDays = 0;
    } else {
      exerciseDays = stepKey === 'very' ? 4 : stepKey === 'high' ? 3 : stepKey === 'mid' ? 2 : 1;
    }

    let stressLevel = 1;
    if (issues.includes('stress'))                        stressLevel += 2;
    if (ls.includes('latenight') || ls.includes('irregular')) stressLevel += 1;
    if (digital === 'high' || digital === 'very')         stressLevel += 1;
    stressLevel = clamp(stressLevel, 1, 4);

    return {
      age, gender, bmi,
      smokingStatus, cigarettesPerDay, smokingQuitMonths: 0,
      drinkingStatus, drinkingQuitMonths: 0,
      sleepHours, exerciseDaysPerWeek: exerciseDays,
      exerciseDuration: 'under3m',
      stressLevel, restingHeartRate: 0,
      hasOcr: false, ocrCount: 0, hasWatchData: false, exerciseBonus: 0,
    };
  }

  function score(answers) {
    const p = convertWebAnswers(answers);

    const sd = smokingDeduction({ smokingStatus: p.smokingStatus, cigarettesPerDay: p.cigarettesPerDay, quitMonths: p.smokingQuitMonths, age: p.age });
    const dd = drinkingDeduction({ drinkingStatus: p.drinkingStatus, quitMonths: p.drinkingQuitMonths, age: p.age });
    const ed = exerciseDeduction({ exerciseDaysPerWeek: p.exerciseDaysPerWeek, age: p.age });
    const sl = sleepDeduction(p.sleepHours);
    const st = stressDeduction(p.stressLevel);
    const bm = bmiDeduction(p.bmi);

    const totalDeduction = clamp(sd + dd + ed + sl + st + bm, 0, 75);

    const rb         = recoveryBonus({ smokingStatus: p.smokingStatus, smokingQuitMonths: p.smokingQuitMonths, drinkingStatus: p.drinkingStatus, drinkingQuitMonths: p.drinkingQuitMonths, exerciseDaysPerWeek: p.exerciseDaysPerWeek, exerciseDuration: p.exerciseDuration, restingHeartRate: p.restingHeartRate });
    const totalBonus = clamp(rb, 0, 25);

    const rawScore   = clamp(100 - totalDeduction + totalBonus, 0, 100);
    const finalScore = Math.round(rawScore);

    const tier = getTier({ rawScore, age: p.age, gender: p.gender, hasOcr: p.hasOcr, ocrCount: p.ocrCount });
    const info = tierInfo(tier);
    const acc  = accuracyIndex({ hasOcr: p.hasOcr, ocrCount: p.ocrCount, hasWatchData: p.hasWatchData, hasHeartRate: p.restingHeartRate > 0 });
    const bAge = calcBodyAge(p.age, rawScore);

    window.PHIN._lastRaw = {
      gender:          p.gender,
      age:             p.age,
      height:          parseFloat(answers.heightNum || 170),
      weight:          parseFloat(answers.weightNum || 70),
      bmi:             parseFloat(p.bmi.toFixed(1)),
      mbti:            answers.mbtiDirect || null,
      web_phin_score:  finalScore,
      web_body_age:    bAge,
      smoking_status:  p.smokingStatus,
      drinking_status: p.drinkingStatus,
    };

    console.log('[PHINv5]', { age: p.age, gender: p.gender, bmi: p.bmi.toFixed(1), smokingStatus: p.smokingStatus, drinkingStatus: p.drinkingStatus, exerciseDays: p.exerciseDaysPerWeek, sleepHours: p.sleepHours, stressLevel: p.stressLevel });
    console.log('[PHINv5 감점]', { sd, dd, ed, sl, st, bm, totalDeduction, totalBonus, rawScore: rawScore.toFixed(1), tier });

    return {
      totalScore: rawScore,
      finalScore,
      tier,
      tierName:      info.name,
      tierLabel:     info.label,
      tierColor:     info.color,
      bodyAge:       bAge,
      accuracyIndex: acc,
      breakdown:     { smoking: sd, drinking: dd, exercise: ed, sleep: sl, stress: st, bmi: bm, bonus: totalBonus },
      score: finalScore,
    };
  }

  window.PHIN = window.PHIN || {};
  window.PHIN.score         = score;
  window.PHIN.tierInfo      = tierInfo;
  window.PHIN.accuracyIndex = accuracyIndex;
})();

          width: 36, height: 36, display: 'inline-flex',

function StepLayout({ step, total, onBack, children, action }) {
  return (

<script type="text/babel">

// ════════════════════════════════════════════════════════
// Steps.jsx — all 6 survey steps
// ════════════════════════════════════════════════════════
function Step1({ answers, setAnswers, onNext, onBack }) {
  const personality = answers.personality || {};
  const [mode, setMode] = React.useState(answers.mbtiDirect ? 'know' : 'questions');

  const pick = (qid, side) => {
    setAnswers({
      ...answers,
      personality: { ...personality, [qid]: side },
      mbtiDirect: null,
    });
  };

  const pickMbti = (mbti) => {
    setAnswers({
      ...answers,
      personality: {
        EI: mbti[0] === 'E' ? 'A' : 'B',
        SN: mbti[1] === 'S' ? 'A' : 'B',
        TF: mbti[2] === 'T' ? 'A' : 'B',
        JP: mbti[3] === 'J' ? 'A' : 'B',
      },
      mbtiDirect: mbti,
    });
  };

  const switchMode = (m) => {
    setMode(m);
    if (m === 'questions') setAnswers({ ...answers, mbtiDirect: null });
  };

  const done = mode === 'know'
    ? !!answers.mbtiDirect
    : ['EI','SN','TF','JP'].every(k => personality[k]);

  return (
    <StepLayout step={1} total={6} onBack={onBack}
      action={<ActionBar onNext={onNext} disabled={!done}
        hint={done ? '' : (mode === 'know' ? '내 MBTI를 골라주세요' : '4개 모두 골라야 다음으로 넘어갈 수 있어요')} />}
    >
      <StepHeader eyebrow="STEP 01 · 성향 진단" title="나는 어떤 사람인가?"
        subtitle="MBTI를 이미 알면 직접 선택하세요. 모르면 4가지 질문으로 알려드릴게요." />
      <ModeToggle mode={mode} setMode={switchMode} />
      {mode === 'know' ? (
        <MbtiGrid value={answers.mbtiDirect} onPick={pickMbti} />
      ) : (
        <AbQuestions questions={window.PHIN.personalityQs} personality={personality} pick={pick} />
      )}
    </StepLayout>
  );
}

function ModeToggle({ mode, setMode }) {
  const Btn = ({ id, label, sub }) => {
    const sel = mode === id;
    return (
      <button onClick={() => setMode(id)} style={{
        flex: 1, background: sel ? 'var(--brand-mute)' : 'transparent',
        border: `1px solid ${sel ? 'var(--accent)' : 'var(--line)'}`,
        borderRadius: 14, padding: '14px 16px', cursor: 'pointer',
        textAlign: 'left', color: sel ? 'var(--ink-hi)' : 'var(--ink-mid)',
        fontFamily: 'var(--font-body)', transition: 'all 220ms var(--ease)',
      }}>
        <div style={{ fontWeight: 700, fontSize: 14 }}>{label}</div>
        <div style={{ fontSize: 12, color: 'var(--ink-lo)', marginTop: 2 }}>{sub}</div>
      </button>
    );
  };
  return (

function MultiGrid({ items, selectedKeys, onToggle }) {
  const anySelected = selectedKeys.length > 0;
  return (
    <div className="phin-multi-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
      {items.map(it => {

          <OptionTile key={it.key} icon={it.icon} label={it.label} desc={it.desc}
            isSelected={sel} isDimmed={anySelected && !sel} onClick={() => onToggle(it.key)} />
        );
      })}
    </div>
  );
}

function SingleList({ items, selected, onPick }) {
  const anySelected = !!selected;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {items.map(it => {
        const sel = selected === it.key;
        return (
          <OptionTile key={it.key} icon={it.icon} label={it.label} desc={it.desc}
            isSelected={sel} isDimmed={anySelected && !sel} onClick={() => onPick(it.key)} />
        );
      })}
    </div>
  );
}

<script type="text/babel">

// ════════════════════════════════════════════════════════
// Result.jsx

const SUPABASE_URL = 'https://ytseevffdonnfxcgfzxe.supabase.co';
const PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.phin.health';
function getSupabaseKey() { return window.__PHIN_SUPABASE_KEY__ || ''; }

// 앱이 설치되어 있으면 phin:// 딥링크로 점수를 전달하고, 설치 안 됐으면 Play Store로 이동
function openAppOrPlayStore(score, tier) {
  const appUrl = `phin://score?value=${encodeURIComponent(score)}&tier=${encodeURIComponent(tier)}`;
  let appOpened = false;
  const onVisibilityChange = () => { if (document.hidden) appOpened = true; };
  document.addEventListener('visibilitychange', onVisibilityChange);
  window.location.href = appUrl;
  setTimeout(() => {
    document.removeEventListener('visibilitychange', onVisibilityChange);
    if (!appOpened) window.open(PLAY_STORE_URL, '_blank');
  }, 1200);
}

window.saveToSupabase = async function saveToSupabase(raw, email) {
  const SUPABASE_KEY = getSupabaseKey();
  if (!SUPABASE_KEY) { console.warn("Supabase 키 없음"); return null; }
  try {
    const token = crypto.randomUUID
      ? crypto.randomUUID()
      : Math.random().toString(36).slice(2) + Date.now().toString(36);

      const payload = {
        email:          email || null,
        token,
        transferred:    false,
        gender:         raw.gender,
        age:            raw.age,
        height:         raw.height,
        weight:         raw.weight,
        bmi:            raw.bmi,
        mbti:           raw.mbti,
        web_phin_score: raw.web_phin_score,
        web_body_age:   raw.web_body_age,
        smoking_status: raw.smoking_status || 'none',
        drinking_status: raw.drinking_status || 'none',
      };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/web_sessions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey':        SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer':        'return=representation',
      },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(await res.text());
    return token;
  } catch (e) {
    console.warn('Supabase 저장 오류 (무시):', e);
    return null;
  }
};

function buildOneLiners(r, answers) {
  const lines = [];
  const bd = r.breakdown || {};

  if (bd.smoking > 0) {
    lines.push(`흡연이 이번 점수에서 가장 큰 영향을 미쳤습니다. 금연을 시작하면 가장 빠르게 점수를 올릴 수 있습니다.`);
  }
  if (bd.drinking > 8) {
    lines.push(`음주 빈도가 높아 간 건강과 수면의 질에 영향을 주고 있습니다. 주 2회 이하로 줄이면 변화가 시작됩니다.`);
  } else if (bd.drinking > 0) {
    lines.push(`음주 습관이 점수에 일부 영향을 주고 있습니다. 음주량을 줄이면 점수 개선에 도움이 됩니다.`);
  }
  if (bd.exercise > 8) {
    lines.push(`규칙적인 운동을 시작하면 점수를 빠르게 끌어올릴 수 있습니다. 주 2회, 30분부터 시작해보세요.`);
  } else if (bd.exercise > 0) {
    lines.push(`운동 빈도를 주 3회 이상으로 늘리면 점수 상승 여력이 있습니다.`);
  }
  if (bd.sleep > 8) {
    lines.push(`수면 시간이 부족합니다. 하루 7~8시간 수면이 회복과 점수 개선의 핵심입니다.`);
  } else if (bd.sleep > 0) {
    lines.push(`수면 시간을 조금 더 확보하면 컨디션과 점수 모두 개선됩니다.`);
  }
  if (bd.stress > 6) {
    lines.push(`스트레스 수준이 높습니다. PHIN 코치의 사색 루틴이 도움이 될 수 있습니다.`);
  }
  if (bd.bmi > 4) {
    lines.push(`체중 관리를 시작하면 심혈관 건강 지표가 함께 개선됩니다.`);
  }
  if (bd.bonus > 5) {
    lines.push(`금연·금주·꾸준한 운동 등 건강 관리 노력이 점수에 긍정적으로 반영됐습니다.`);
  }
  if (lines.length === 0) {
    lines.push(`전반적으로 양호한 생활습관을 유지하고 있습니다. 건강검진 데이터를 추가하면 더 정밀한 분석이 가능합니다.`);
  }

  return lines;
}

                width:12, height:12, borderRadius:9999, background:tierColor,

              }} />
              <span style={{
                fontFamily:'var(--font-display)', fontSize:18, fontWeight:800,
                color:'var(--ink-hi)', letterSpacing:'-0.02em', whiteSpace:'nowrap',
              }}>{tierName}</span>
            </div>

            <div style={{
              marginTop:16, display:'inline-flex', alignItems:'center', gap:6,
              padding:'6px 14px', borderRadius:9999,
              background:'var(--bg-elev-1)', border:'1px solid var(--line)',
            }}>
              <span style={{ fontSize:11, color:'var(--ink-mid)' }}>📊 점수 신뢰도</span>
              <span style={{ fontSize:13, fontWeight:700, color:'var(--accent)' }}>{accuracy}%</span>
              <span style={{ fontSize:11, color:'var(--ink-lo)' }}>· 건강검진 추가 시 더 정밀해집니다</span>
            </div>
          </div>
        </section>

        <section style={{ marginTop:64 }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12 }} className="phin-insight-grid">
            <InsightCard
              eyebrow="성향 유형"
              big={mbtiText || '?'}
              small={mbtiText ? 'MBTI 기반' : '앱에서 설정 가능'}
            />
            <InsightCard
              eyebrow="신체나이"
              big={`${bodyAge}세`}
              small={`실제 ${realAge}세 · ${bodyAge - realAge > 0 ? '+' : ''}${bodyAge - realAge}세`}
              tone={bodyAge > realAge ? 'warn' : 'good'}
            />
            <InsightCard
              eyebrow="동년배 위치"
              big={tierLabel}
              small={`${realAge}세 ${answers.gender === 'female' ? '여성' : '남성'} 기준`}
            />
          </div>
        </section>

        <section style={{ marginTop:32 }}>
          <div className="phin-card">
            <div className="phin-micro" style={{ color:'var(--accent)', marginBottom:16 }}>1차 분석 리포트</div>
            <ul style={{ listStyle:'none', padding:0, margin:0, display:'flex', flexDirection:'column', gap:14 }}>
              {oneLiners.map((line, i) => (
                <li key={i} style={{ display:'flex', gap:12, alignItems:'flex-start', color:'var(--ink-hi)', fontSize:15, lineHeight:1.55 }}>
                  <span style={{ flexShrink:0, marginTop:8, width:6, height:6, borderRadius:9999, background:'var(--accent)' }} />
                  <span>{line}</span>
                </li>
              ))}
            </ul>
          </div>
        </section>

        <section style={{ marginTop:32 }}>
          <div className="phin-card">
            <div className="phin-micro t-mid" style={{ marginBottom:16 }}>티어 사다리</div>
            <TierLadder currentTier={r.tier} score={displayScore} />
            <p className="phin-body-sm t-mid" style={{ marginTop:16 }}>
              맞춤 코칭을 한 달만 따라가면 평균 <b style={{ color:'var(--accent)' }}>2~6포인트</b> 상승.
              식단을 병행하면 최대 <b style={{ color:'var(--accent)' }}>10포인트</b>까지 올라갑니다.
            </p>
          </div>
        </section>

        <section style={{ marginTop:32 }}>
          <div className="phin-card" style={{ border:'1px solid var(--line-strong)' }}>
            <div className="phin-micro" style={{ color:'var(--accent)', marginBottom:12 }}>
              📱 앱에서 이어서 보기
            </div>
            <p className="phin-body-sm t-mid" style={{ marginBottom:16 }}>
              이메일을 등록하면 앱 설치 후 같은 이메일로 로그인할 때<br />
              지금 입력한 정보가 <b style={{ color:'var(--ink-hi)' }}>자동으로 채워집니다.</b> 다시 입력할 필요 없어요.
            </p>

            {saved ? (
              <div style={{
                background:'var(--brand-mute)', border:'1px solid var(--accent)',
                borderRadius:12, padding:'14px 18px',
                display:'flex', alignItems:'center', gap:10,
              }}>
                <span style={{ color:'var(--accent)', fontSize:18 }}>✓</span>
                <div>
                  <div style={{ color:'var(--ink-hi)', fontWeight:600, fontSize:14 }}>등록 완료!</div>
                  <div style={{ color:'var(--ink-mid)', fontSize:12, marginTop:2 }}>
                    앱 설치 후 <b>{email}</b>로 로그인하면 자동 연결됩니다.
                  </div>
                </div>
              </div>
            ) : (
              <div style={{ display:'flex', gap:8 }}>
                <input
                  type="email"
                  placeholder="이메일 주소 입력"
                  value={email}
                  onChange={e => setEmail(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleEmailSave()}
                  style={{
                    flex:1, padding:'12px 16px',
                    background:'var(--bg-elev-2)', border:'1px solid var(--line-strong)',
                    borderRadius:10, color:'var(--ink-hi)',
                    fontSize:14, fontFamily:'var(--font-body)', outline:'none',
                  }}
                />
                <button
                  className="phin-btn phin-btn-primary"
                  onClick={handleEmailSave}
                  disabled={!email || saving}
                  style={{ padding:'12px 20px', fontSize:14, whiteSpace:'nowrap' }}
                >
                  {saving ? '저장 중…' : '앱 연결'}
                </button>
              </div>
            )}
            {emailError && (
              <div style={{
                marginTop:8, padding:'10px 14px',
                background:'rgba(220,38,38,0.15)',
                border:'1px solid rgba(220,38,38,0.4)',
                borderRadius:10, color:'#f87171', fontSize:13,
              }}>
                ⚠️ {emailError}
              </div>
            )}
            {saved && (
              <button
                onClick={() => { setSaved(false); setToken(null); setEmail(''); setEmailError(''); }}
                style={{
                  marginTop:8, background:'none', border:'none',
                  color:'var(--ink-lo)', fontSize:12, cursor:'pointer',
                  textDecoration:'underline', padding:0,
                }}
              >
                다른 이메일로 다시 연결하기
              </button>
            )}
          </div>
        </section>

        <section style={{ marginTop:32 }}>
          <div className="phin-card" style={{
            position:'relative', overflow:'hidden',
            border:'1px dashed var(--line-strong)',
          }}>
            <div className="phin-micro" style={{ color:'var(--ink-lo)', marginBottom:16 }}>🔒 앱에서만 열람 가능</div>
            <h3 className="phin-display-sm t-hi" style={{ marginBottom:8 }}>
              정밀 코칭 리포트 + 매일 맞춤 운동
            </h3>
            <p className="phin-body t-mid" style={{ marginBottom:0, maxWidth:480 }}>
              주간·월간 PHIN스코어 추이, 부위별 신체 대시보드, 매일 다른 맞춤 운동,
              PHIN 코치와의 1:1 피드백 — 앱 다운로드 시 잠금 해제됩니다.
            </p>
            <div style={{
              position:'absolute', inset:'auto -10% -50% auto', width:280, height:280,
              background:'radial-gradient(circle, var(--brand-glow), transparent 70%)',
              pointerEvents:'none',
            }} />
          </div>
        </section>

        <section style={{ marginTop:40, display:'flex', flexDirection:'column', gap:12, alignItems:'stretch' }}>
          <button className="phin-btn phin-btn-primary" style={{ width:'100%', padding:'18px 24px' }}
            onClick={() => openAppOrPlayStore(displayScore, r.tier)}>
            앱 다운로드하고 전체 리포트 보기
          </button>
          <button className="phin-btn phin-btn-secondary" style={{ width:'100%' }}
            onClick={() => {
              const text = `내 PHIN스코어는 ${displayScore}점 (${tierName})! 신체나이 ${bodyAge}세. 너는 몇 점이야? phin.health`;
              if (navigator.share) navigator.share({ text });
              else { navigator.clipboard.writeText(text); alert('클립보드에 복사됐어요!'); }
            }}>
            결과 공유하기 — 친구 점수와 비교
          </button>
          <div className="phin-caption t-lo" style={{ textAlign:'center', marginTop:8 }}>
            카카오 · 인스타 공유로 친구 PHIN스코어와 비교해보세요
          </div>
        </section>

      </main>
    </div>
  );
}

function InsightCard({ eyebrow, big, small, tone }) {
  const color = tone === 'good' ? 'var(--accent)' : tone === 'warn' ? 'var(--tier-yellow)' : 'var(--ink-hi)';
  return (
    <div className="phin-card" style={{ display:'flex', flexDirection:'column', gap:6, minHeight:140 }}>
      <div className="phin-micro t-lo">{eyebrow}</div>
      <div style={{
        fontFamily:'var(--font-display)', fontWeight:800,
        fontSize:28, letterSpacing:'-0.02em', color, lineHeight:1.1, marginTop:8,
      }}>{big}</div>
      <div className="phin-body-sm t-mid" style={{ marginTop:4 }}>{small}</div>
    </div>
  );
}

function TierLadder({ currentTier, score }) {
  const tiers = [
    { key:'GRAY',     name:'GRAY',  color:'#9CA3AF', label:'하위권'   },
    { key:'RED',      name:'RED',   color:'#F87171', label:'중하위'   },
    { key:'YELLOW',   name:'YELLOW',color:'#FBBF24', label:'중위'     },
    { key:'BLUE',     name:'BLUE',  color:'#60A5FA', label:'중상위'   },
    { key:'GREEN',    name:'GREEN', color:'#34D378', label:'상위권'   },
    { key:'BLACK',    name:'BLACK', color:'#E5E5E5', label:'최상위 5%'},
    { key:'THE_PHIN', name:'THE',   color:'#FFD700', label:'최상위 1%'},
  ];
  return (
    <div style={{ display:'flex', gap:4, flexWrap:'wrap' }} className="phin-ladder">
      {tiers.map(t => {
        const active = t.key === currentTier;
        return (
          <div key={t.key} style={{
            flex:'1 1 12%', minWidth:40, borderRadius:10,
            border: active ? `1px solid ${t.color}` : '1px solid var(--line)',
            background: active ? `${t.color}18` : 'transparent',
            padding:'10px 8px', display:'flex', flexDirection:'column', gap:4,
            opacity: active ? 1 : 0.5,
            transition:'opacity 220ms',
          }}>
            <div style={{
              width:8, height:8, borderRadius:9999, background:t.color,
              boxShadow: active ? `0 0 10px ${t.color}` : 'none',
            }} />
            <div style={{
              fontFamily:'var(--font-display)', fontSize:10, fontWeight:800,
              color: active ? 'var(--ink-hi)' : 'var(--ink-mid)',
            }}>{t.name}</div>
            <div style={{ fontSize:9, color:'var(--ink-lo)' }}>{t.label}</div>
          </div>
        );
      })}
    </div>
  );
}
</script>

<script type="text/babel">

// ════════════════════════════════════════════════════════
// App — 화면 라우팅 + localStorage 영속화 (Tweaks 패널 제외, 운영용)
// ════════════════════════════════════════════════════════
const SCREENS = ['landing', 's1', 's2', 's3', 's4', 's5', 's6', 'result'];

function App() {
  const [screen, setScreen] = React.useState('landing');
  const [answers, setAnswers] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('phin_answers')) || {}; }
    catch (e) { return {}; }
  });

  React.useEffect(() => {
    localStorage.setItem('phin_answers', JSON.stringify(answers));
  }, [answers]);

  React.useEffect(() => {
    const saved = localStorage.getItem('phin_screen');
    if (saved && SCREENS.includes(saved)) setScreen(saved);
  }, []);
  React.useEffect(() => {
    localStorage.setItem('phin_screen', screen);
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, [screen]);

  const go = (s) => setScreen(s);
  const restart = () => { setAnswers({}); go('landing'); };

  let body;
  switch (screen) {
    case 'landing': body = <Landing onStart={() => go('s1')} />; break;
    case 's1': body = <Step1 answers={answers} setAnswers={setAnswers} onBack={() => go('landing')} onNext={() => go('s2')} />; break;
    case 's2': body = <Step2 answers={answers} setAnswers={setAnswers} onBack={() => go('s1')} onNext={() => go('s3')} />; break;
    case 's3': body = <Step3 answers={answers} setAnswers={setAnswers} onBack={() => go('s2')} onNext={() => go('s4')} />; break;
    case 's4': body = <Step4 answers={answers} setAnswers={setAnswers} onBack={() => go('s3')} onNext={() => go('s5')} />; break;
    case 's5': body = <Step5 answers={answers} setAnswers={setAnswers} onBack={() => go('s4')} onNext={() => go('s6')} />; break;
    case 's6': body = <Step6 answers={answers} setAnswers={setAnswers} onBack={() => go('s5')} onNext={() => go('result')} />; break;
    case 'result': {
      const fullAnswers = (() => {
        try {
          const saved = JSON.parse(localStorage.getItem('phin_answers')) || {};
          return { ...saved, ...answers };
        }
        catch(e) { return answers; }
      })();
      body = <Result answers={fullAnswers} onRestart={restart} />;
      break;
    }
    default: body = <Landing onStart={() => go('s1')} />;
  }

  return <div key={screen} data-screen-label={screen}>{body}</div>;
}

function tryMount() {
  if (!document.getElementById('phin-root')) {
    setTimeout(tryMount, 50);
    return;
  }
  const root = ReactDOM.createRoot(document.getElementById('phin-root'));
  root.render(<App />);
}
tryMount();
</script>
