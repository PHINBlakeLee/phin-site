<!doctype html>
<!-- @dsCard group="Colors" name="PHIN 티어 팔레트" subtitle="5가지 등급 — GRAY → RED → YELLOW → BLUE → GREEN PHIN" viewport="700x230" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw {
    padding: 16px 12px;
    border-radius: 14px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    display: flex; flex-direction: column;
    gap: 10px;
    min-height: 180px;
  }
  .dot { width: 32px; height: 32px; border-radius: 9999px; }
  .name { font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: -0.02em; }
  .range { font-family: ui-monospace, monospace; font-size: 10px; color: var(--ink-lo); }
  .score { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 30px; letter-spacing: -0.04em; line-height: 1; margin-top: auto; }
</style></head><body>
<div class="row">
  <div class="sw">
    <div class="dot" style="background:#888888"></div>
    <div><div class="name" style="color:#888">GRAY PHIN</div><div class="range">0–34</div></div>
    <div class="score" style="color:#888888">12</div>
  </div>
  <div class="sw">
    <div class="dot" style="background:#ff4a4a; box-shadow:0 0 16px #ff4a4a55"></div>
    <div><div class="name" style="color:#ff4a4a">RED PHIN</div><div class="range">35–49</div></div>
    <div class="score" style="color:#ff4a4a">42</div>
  </div>
  <div class="sw">
    <div class="dot" style="background:#f5c518; box-shadow:0 0 16px #f5c51855"></div>
    <div><div class="name" style="color:#f5c518">YELLOW PHIN</div><div class="range">50–64</div></div>
    <div class="score" style="color:#f5c518">57</div>
  </div>
  <div class="sw">
    <div class="dot" style="background:#4a9eff; box-shadow:0 0 16px #4a9eff55"></div>
    <div><div class="name" style="color:#4a9eff">BLUE PHIN</div><div class="range">65–79</div></div>
    <div class="score" style="color:#4a9eff">72</div>
  </div>
  <div class="sw" style="border-color:#39ff6a">
    <div class="dot" style="background:#39ff6a; box-shadow:0 0 18px #39ff6a"></div>
    <div><div class="name" style="color:#39ff6a">GREEN PHIN</div><div class="range">80–100</div></div>
    <div class="score" style="color:#39ff6a">88</div>
  </div>
</div>
</body></html>
