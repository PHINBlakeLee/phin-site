<!doctype html>
<!-- @dsCard group="Components" name="PHIN Score display (signature)" subtitle="채점 순간 — 큰 숫자 + 티어 pill + glow" viewport="700x320" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; position: relative; overflow: hidden; min-height: 320px; }
  .glow {
    position: absolute; inset: -10% -10% auto -10%; height: 360px;
    background: radial-gradient(50% 60% at 50% 40%, #4a9eff33, transparent 70%);
    pointer-events: none;
  }
  .wrap { position: relative; z-index: 1; text-align: center; padding-top: 12px; }
  .label {
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mid);
    margin-bottom: 8px;
  }
  .num {
    font-family: 'Inter', sans-serif; font-weight: 900;
    font-size: 160px; line-height: 0.9; letter-spacing: -0.06em;
    color: #4a9eff; font-variant-numeric: tabular-nums;
  }
  .out-of { font-family: 'Inter', sans-serif; font-weight: 600; color: var(--ink-lo); font-size: 13px; letter-spacing: 0.06em; }
  .pill {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 18px; border-radius: 9999px;
    background: var(--bg-elev-1); border: 1px solid #4a9eff;
    margin-top: 16px;
  }
  .dot { width: 10px; height: 10px; border-radius: 9999px; background: #4a9eff; box-shadow: 0 0 14px #4a9eff; }
  .tier-name { font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: -0.02em; color: var(--ink-hi); }
</style></head><body>
<div class="glow"></div>
<div class="wrap">
  <div class="label">YOUR PHIN SCORE</div>
  <div class="num">72</div>
  <div class="out-of">/ 100</div>
  <div class="pill">
    <span class="dot"></span>
    <span class="tier-name">BLUE PHIN</span>
  </div>
</div>
</body></html>
