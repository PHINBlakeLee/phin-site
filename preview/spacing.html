<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing 스케일" subtitle="4px base · xxs → 5xl (총 10단계)" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; }
  .row { display: flex; align-items: flex-end; gap: 16px; height: 110px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 6px; }
  .bar { background: var(--brand-bright); width: 28px; border-radius: 4px; box-shadow: 0 0 8px rgba(57,255,106,0.35); }
  .tag { font-family: ui-monospace, monospace; font-size: 10px; color: var(--ink-lo); white-space: nowrap; }
  .val { font-size: 12px; font-weight: 600; color: var(--ink-hi); }
</style></head><body>
<div class="row">
  <div class="item"><div class="bar" style="height:2px"></div><div class="val">2</div><div class="tag">xxs</div></div>
  <div class="item"><div class="bar" style="height:4px"></div><div class="val">4</div><div class="tag">xs</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="val">8</div><div class="tag">sm</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="val">12</div><div class="tag">md</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="val">16</div><div class="tag">lg</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="val">24</div><div class="tag">xl</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="val">32</div><div class="tag">2xl</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="val">48</div><div class="tag">3xl</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="val">64</div><div class="tag">4xl</div></div>
  <div class="item"><div class="bar" style="height:96px"></div><div class="val">96</div><div class="tag">5xl</div></div>
</div>
</body></html>
