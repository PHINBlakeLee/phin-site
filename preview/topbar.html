<!doctype html>
<!-- @dsCard group="Components" name="Survey 상단바 (progress)" subtitle="뒤로 · PHIN 로고 · STEP N/6 · 프로그레스 bar" viewport="700x100" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; }
  .bar {
    height: 56px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; padding: 0 20px; gap: 12px;
    background: var(--bg);
  }
  .ghost {
    background: transparent; border: 0; padding: 6px 10px;
    color: var(--ink-mid); cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .logo { font-family: 'Pretendard', sans-serif; font-weight: 900; font-size: 18px; letter-spacing: -0.04em; color: var(--ink-hi); }
  .logo .accent { color: var(--brand-bright); }
  .step { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--ink-mid); }
  .step .dim { color: var(--ink-lo); }
  .prog {
    height: 2px; background: var(--line);
  }
  .prog .fill {
    height: 100%; background: var(--brand-bright); width: 50%;
  }
</style></head><body>
<div class="bar">
  <button class="ghost">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    뒤로
  </button>
  <div style="flex:1"></div>
  <div class="logo">PHi<span class="accent">N</span></div>
  <div style="flex:1"></div>
  <div class="step">STEP 03 <span class="dim">/ 06</span></div>
</div>
<div class="prog"><div class="fill"></div></div>
</body></html>
