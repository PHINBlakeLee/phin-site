<!doctype html>
<!-- @dsCard group="Colors" name="Ink 사다리 (텍스트 명도)" subtitle="선택=밝아짐 · 미선택=어두워짐 — 4단계" viewport="700x200" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { padding: 12px; border-radius: 12px; min-height: 130px; background: var(--bg-elev-1); border: 1px solid var(--line); display: flex; flex-direction: column; justify-content: space-between; }
  .chip { width: 100%; height: 56px; border-radius: 10px; }
  .name { font-weight: 600; font-size: 13px; color: var(--ink-hi); }
  .hex { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-mid); margin-top: 4px; }
  .sample { font-size: 13px; }
</style></head><body>
<div class="row">
  <div class="sw">
    <div class="chip" style="background:#ffffff"></div>
    <div><div class="name">Ink Hi</div>
      <div class="hex">#ffffff · selected · primary</div>
      <div class="sample" style="color:#ffffff; margin-top:6px;">샘플 텍스트</div>
    </div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#a8b1ad"></div>
    <div><div class="name">Ink Mid</div>
      <div class="hex">#a8b1ad · default / idle</div>
      <div class="sample" style="color:#a8b1ad; margin-top:6px;">샘플 텍스트</div>
    </div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#5b6661"></div>
    <div><div class="name">Ink Lo</div>
      <div class="hex">#5b6661 · unselected · dim</div>
      <div class="sample" style="color:#5b6661; margin-top:6px;">샘플 텍스트</div>
    </div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#313836"></div>
    <div><div class="name">Ink X-Lo</div>
      <div class="hex">#313836 · disabled · divider</div>
      <div class="sample" style="color:#313836; margin-top:6px;">샘플 텍스트</div>
    </div>
  </div>
</div>
</body></html>
