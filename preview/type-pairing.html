<!doctype html>
<!-- @dsCard group="Type" name="Pretendard ↔ Inter 페어링" subtitle="숫자는 Inter · 한글은 Pretendard — 한 화면에서 자연스럽게" viewport="700x200" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; }
  .card { background: var(--bg-elev-1); border: 1px solid var(--line); border-radius: 18px; padding: 22px 24px; display: flex; flex-direction: column; gap: 12px; }
  .label { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-lo); }

  <div class="card">

      </div>
      <div style="flex:1; display: flex; flex-direction: column; gap: 6px;">

      </div>
    </div>
  </div>
